<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶海虾王·镜心 - 桌面启动器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 启动器界面 */
        #launcher {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0F0F1A 0%, #1a1a2e 100%);
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #fff;
        }
        
        .logo {
            font-size: 72px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #6B8E23, #1E88E5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .slogan {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 40px;
        }
        
        .btn {
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6B8E23, #1E88E5);
            color: #fff;
            box-shadow: 0 4px 20px rgba(107,142,35,0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(107,142,35,0.5);
        }
        
        .tip {
            margin-top: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        
        /* 全屏 iframe 容器 */
        #app-container {
            display: none;
            width: 100vw;
            height: 100vh;
        }
        
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 启动器界面 -->
    <div id="launcher">
        <div class="logo">🦐🍵🪞</div>
        <h1>茶海虾王·镜心</h1>
        <div class="slogan">以茶为镜 · 照见本心</div>
        <button class="btn btn-primary" onclick="openApp()">🚀 打开应用</button>
        <div class="tip">点击上方按钮启动应用（需要联网）</div>
    </div>
    
    <!-- 应用容器 -->
    <div id="app-container">
        <iframe id="app-frame" src="https://tsskms.pages.dev/"></iframe>
    </div>
    
    <script>
        // 检查是否点击过"不再显示"
        function openApp() {
            document.getElementById('launcher').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            
            // 保存用户选择
            localStorage.setItem('skipLauncher', 'true');
        }
        
        // 页面加载时检查
        window.addEventListener('load', function() {
            if (localStorage.getItem('skipLauncher') === 'true') {
                openApp();
            }
        });
    </script>
</body>
</html>
