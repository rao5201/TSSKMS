name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests configured"

      - name: Build complete
        run: echo "Build completed"

  deploy-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Northflank CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/northflank-gh/nf/main/install.sh | sh

      - name: Deploy to Northflank
        env:
          NF_TOKEN: ${{ secrets.NORTHFLANK_TOKEN }}
        run: |
          nf login --token $NF_TOKEN
          cd backend
          nf deploy --name tsskms-backend --project tsskms
